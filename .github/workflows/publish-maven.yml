name: Publish Maven artifacts

on:
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: publish-maven-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            echo "Release tags must not start with 'v'. Use '${GITHUB_REF_NAME#v}' instead."
            exit 1
          fi

          if [[ ! "${GITHUB_REF_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must be a SemVer version such as 5.1.0 or 5.1.0-rc.1."
            exit 1
          fi

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Publish
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishToMavenCentral -PreleaseVersion="${GITHUB_REF_NAME}" --no-configuration-cache
