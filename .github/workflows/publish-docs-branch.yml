name: Publish Dokka docs branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-docs-branch
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Generate Dokka HTML
        run: ./gradlew :trakt-bot:dokkaGenerateHtml

      - name: Publish generated docs to docs branch
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf docs-worktree
          git worktree add --detach docs-worktree

          cd docs-worktree
          git checkout --orphan docs-output
          git rm -rf . >/dev/null 2>&1 || true

          cp -R ../trakt-bot/build/dokka/html/. .
          git add -A

          if git diff --cached --quiet; then
            echo "No documentation changes to publish."
            exit 0
          fi

          git commit -m "Update Dokka docs for ${GITHUB_SHA}"
          git push --force origin HEAD:docs
